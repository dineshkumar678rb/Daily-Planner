<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PlanPro — Daily Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg-grad: radial-gradient(1200px 800px at 10% -10%, #c7d2fe 0%, transparent 60%),
             radial-gradient(900px 700px at 110% 10%, #fbcfe8 0%, transparent 55%),
             radial-gradient(900px 700px at 50% 110%, #a7f3d0 0%, transparent 55%),
             linear-gradient(180deg, #eef2ff, #fdf2f8);
  --glass-bg: rgba(255,255,255,0.55);
  --glass-bd: rgba(255,255,255,0.7);
  --glass-shadow: 0 10px 40px rgba(31,38,135,0.15);
  --text: #0f172a; --muted: #475569;
  --accent: #6366f1; --accent-2: #ec4899;
  --success: #10b981; --warn: #f59e0b; --danger: #ef4444;
  --chip: rgba(255,255,255,0.7); --border: rgba(255,255,255,0.6); --input: rgba(255,255,255,0.6);
}
[data-theme="dark"]{
  --bg-grad: radial-gradient(1200px 800px at 10% -10%, #4338ca 0%, transparent 60%),
             radial-gradient(900px 700px at 110% 10%, #be185d 0%, transparent 55%),
             radial-gradient(900px 700px at 50% 110%, #047857 0%, transparent 55%),
             linear-gradient(180deg, #0b1020, #1a0b1f);
  --glass-bg: rgba(20,22,40,0.55); --glass-bd: rgba(255,255,255,0.12);
  --glass-shadow: 0 10px 40px rgba(0,0,0,0.4);
  --text: #f1f5f9; --muted: #cbd5e1;
  --chip: rgba(255,255,255,0.08); --border: rgba(255,255,255,0.12); --input: rgba(255,255,255,0.08);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;min-height:100vh;font-family:'Inter',system-ui,sans-serif;color:var(--text);}
body{background:var(--bg-grad);background-attachment:fixed;}
h1,h2,h3,h4{font-family:'Space Grotesk',sans-serif;font-weight:700;letter-spacing:-0.02em;margin:0;}
.app{max-width:1280px;margin:0 auto;padding:24px;}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
.brand{display:flex;align-items:center;gap:12px;}
.logo{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:grid;place-items:center;color:#fff;font-weight:700;box-shadow:0 8px 24px rgba(99,102,241,.4);}
.brand h1{font-size:24px;} .brand p{margin:0;color:var(--muted);font-size:13px;}
.glass{background:var(--glass-bg);backdrop-filter:blur(20px) saturate(160%);border:1px solid var(--glass-bd);border-radius:20px;box-shadow:var(--glass-shadow);}
.icon-btn{width:42px;height:42px;border-radius:12px;border:1px solid var(--border);background:var(--chip);color:var(--text);cursor:pointer;display:grid;place-items:center;transition:transform .2s,background .2s;}
.icon-btn:hover{transform:translateY(-2px);}
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px;margin-bottom:20px;}
.stat{padding:18px 20px;display:flex;align-items:center;gap:14px;animation:fadeUp .5s ease both;}
.stat .ic{width:48px;height:48px;border-radius:14px;display:grid;place-items:center;color:#fff;font-size:20px;}
.stat .v{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;line-height:1;}
.stat .l{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.08em;margin-top:4px;}
.grid{display:grid;grid-template-columns:1.4fr 1fr;gap:20px;}
.section{padding:22px;}
.section h2{font-size:18px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
.form{display:grid;gap:10px;} .form .row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
input,select,textarea,button{font:inherit;color:var(--text);}
.input{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--border);background:var(--input);outline:none;transition:border .2s,box-shadow .2s;}
.input:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(99,102,241,.18);}
.btn{padding:12px 18px;border-radius:12px;border:none;cursor:pointer;font-weight:600;background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;box-shadow:0 8px 20px rgba(99,102,241,.35);transition:transform .2s,box-shadow .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 12px 26px rgba(99,102,241,.45);}
.btn.ghost{background:var(--chip);color:var(--text);box-shadow:none;border:1px solid var(--border);}
.tasks{display:flex;flex-direction:column;gap:10px;margin-top:8px;max-height:520px;overflow:auto;padding-right:4px;}
.tasks::-webkit-scrollbar{width:8px;} .tasks::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;}
.task{display:flex;align-items:flex-start;gap:12px;padding:14px;border-radius:14px;background:var(--chip);border:1px solid var(--border);animation:fadeUp .35s ease both;transition:transform .2s;}
.task:hover{transform:translateY(-1px);} .task.done .t{text-decoration:line-through;opacity:.55;}
.check{width:22px;height:22px;border-radius:7px;border:2px solid var(--accent);flex-shrink:0;cursor:pointer;display:grid;place-items:center;margin-top:2px;background:transparent;}
.task.done .check{background:linear-gradient(135deg,var(--accent),var(--accent-2));border-color:transparent;color:#fff;}
.task .body{flex:1;min-width:0;} .task .t{font-weight:600;}
.task .meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;font-size:11px;}
.chip{padding:3px 9px;border-radius:999px;background:var(--chip);border:1px solid var(--border);color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600;}
.chip.high{background:rgba(239,68,68,.15);color:var(--danger);border-color:transparent;}
.chip.medium{background:rgba(245,158,11,.15);color:var(--warn);border-color:transparent;}
.chip.low{background:rgba(16,185,129,.15);color:var(--success);border-color:transparent;}
.chip.cat{background:rgba(99,102,241,.15);color:var(--accent);border-color:transparent;}
.actions{display:flex;gap:6px;}
.icon-mini{width:32px;height:32px;border-radius:9px;border:1px solid var(--border);background:transparent;cursor:pointer;display:grid;place-items:center;color:var(--muted);transition:color .2s,background .2s;}
.icon-mini:hover{color:var(--text);background:var(--chip);}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.filters button{padding:6px 12px;border-radius:999px;border:1px solid var(--border);background:var(--chip);cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);}
.filters button.active{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;border-color:transparent;}
.empty{text-align:center;padding:30px;color:var(--muted);}
.cal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.dow{text-align:center;font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:600;padding:6px 0;}
.day{aspect-ratio:1;border-radius:10px;background:var(--chip);border:1px solid transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;font-weight:600;font-size:13px;transition:transform .15s;}
.day:hover{transform:scale(1.05);border-color:var(--accent);}
.day.other{opacity:.3;}
.day.today{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;}
.day.has-tasks::after{content:'';width:5px;height:5px;border-radius:50%;background:var(--accent-2);position:absolute;bottom:6px;}
.day.today.has-tasks::after{background:#fff;}
.day.selected{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.25);}
.progress-wrap{margin-top:14px;}
.progress{height:10px;background:var(--chip);border-radius:999px;overflow:hidden;border:1px solid var(--border);}
.progress > div{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-2));border-radius:999px;transition:width .4s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@media (max-width:960px){.grid{grid-template-columns:1fr;}.stats{grid-template-columns:repeat(2,1fr);}.form .row{grid-template-columns:1fr;}}
.dialog-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:50;padding:20px;}
.dialog-bg.open{display:flex;animation:fadeUp .25s ease;}
.dialog{width:100%;max-width:480px;padding:24px;} .dialog h3{margin-bottom:14px;}
.dialog-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:14px;}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="brand">
      <div class="logo">P</div>
      <div><h1>PlanPro</h1><p id="today-label">Your day, beautifully planned</p></div>
    </div>
    <button class="icon-btn" id="theme-toggle" title="Toggle theme">🌙</button>
  </header>

  <section class="stats">
    <div class="stat glass"><div class="ic" style="background:linear-gradient(135deg,#6366f1,#8b5cf6)">📋</div><div><div class="v" id="stat-total">0</div><div class="l">Total Tasks</div></div></div>
    <div class="stat glass"><div class="ic" style="background:linear-gradient(135deg,#10b981,#22d3ee)">✅</div><div><div class="v" id="stat-done">0</div><div class="l">Completed</div></div></div>
    <div class="stat glass"><div class="ic" style="background:linear-gradient(135deg,#f59e0b,#ef4444)">⏳</div><div><div class="v" id="stat-pending">0</div><div class="l">Pending</div></div></div>
    <div class="stat glass"><div class="ic" style="background:linear-gradient(135deg,#ec4899,#f43f5e)">📈</div><div><div class="v" id="stat-prod">0%</div><div class="l">Productivity</div></div></div>
  </section>

  <div class="grid">
    <div class="section glass">
      <h2>Add a task</h2>
      <div class="form">
        <input id="t-title" class="input" placeholder="What needs to get done?" />
        <div class="row">
          <input id="t-date" type="date" class="input" />
          <select id="t-priority" class="input">
            <option value="High">High priority</option>
            <option value="Medium" selected>Medium priority</option>
            <option value="Low">Low priority</option>
          </select>
          <select id="t-category" class="input">
            <option value="Study">Study</option>
            <option value="Work" selected>Work</option>
            <option value="Personal">Personal</option>
          </select>
        </div>
        <button class="btn" id="add-btn">+ Add task</button>
      </div>

      <h2 style="margin-top:24px">Tasks <span id="task-day" style="font-size:12px;color:var(--muted);font-weight:500;font-family:Inter"></span></h2>
      <div class="filters" id="filters">
        <button data-f="all" class="active">All</button>
        <button data-f="pending">Pending</button>
        <button data-f="done">Completed</button>
        <button data-f="High">High</button>
        <button data-f="Study">Study</button>
        <button data-f="Work">Work</button>
        <button data-f="Personal">Personal</button>
      </div>
      <div class="tasks" id="task-list"></div>
    </div>

    <div class="section glass">
      <h2>Calendar</h2>
      <div class="cal-head">
        <button class="icon-mini" id="prev-month">‹</button>
        <div id="month-label" style="font-family:'Space Grotesk';font-weight:600"></div>
        <button class="icon-mini" id="next-month">›</button>
      </div>
      <div class="cal-grid" id="dow"></div>
      <div class="cal-grid" id="calendar" style="margin-top:6px"></div>

      <div class="progress-wrap">
        <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px"><span>Today's progress</span><span id="prog-text">0%</span></div>
        <div class="progress"><div id="prog-bar" style="width:0%"></div></div>
      </div>
    </div>
  </div>
</div>

<div class="dialog-bg" id="edit-dialog">
  <div class="dialog glass">
    <h3>Edit task</h3>
    <div class="form">
      <input id="e-title" class="input" />
      <div class="row">
        <input id="e-date" type="date" class="input" />
        <select id="e-priority" class="input"><option>High</option><option>Medium</option><option>Low</option></select>
        <select id="e-category" class="input"><option>Study</option><option>Work</option><option>Personal</option></select>
      </div>
    </div>
    <div class="dialog-actions">
      <button class="btn ghost" id="e-cancel">Cancel</button>
      <button class="btn" id="e-save">Save</button>
    </div>
  </div>
</div>

<script>
const STORE_KEY='planpro.tasks.v1';
const THEME_KEY='planpro.theme';
const todayIso=()=>new Date().toISOString().slice(0,10);
let tasks = JSON.parse(localStorage.getItem(STORE_KEY)||'[]');
let filter='all';
let viewDate = new Date();
let selectedDate = todayIso();
let editingId = null;

const root=document.documentElement;
const savedTheme=localStorage.getItem(THEME_KEY)||'light';
root.dataset.theme=savedTheme;
document.getElementById('theme-toggle').textContent = savedTheme==='dark'?'☀️':'🌙';
document.getElementById('theme-toggle').onclick=()=>{
  const next=root.dataset.theme==='dark'?'light':'dark';
  root.dataset.theme=next;localStorage.setItem(THEME_KEY,next);
  document.getElementById('theme-toggle').textContent = next==='dark'?'☀️':'🌙';
};

document.getElementById('today-label').textContent = new Date().toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'});
document.getElementById('t-date').value = todayIso();

function save(){localStorage.setItem(STORE_KEY,JSON.stringify(tasks));render();}
function uid(){return Math.random().toString(36).slice(2,10);}

document.getElementById('add-btn').onclick=()=>{
  const title=document.getElementById('t-title').value.trim();
  if(!title)return;
  tasks.unshift({id:uid(),title,date:document.getElementById('t-date').value||todayIso(),
    priority:document.getElementById('t-priority').value,category:document.getElementById('t-category').value,done:false,createdAt:Date.now()});
  document.getElementById('t-title').value='';
  save();
};
document.getElementById('t-title').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('add-btn').click();});

document.getElementById('filters').addEventListener('click',e=>{
  if(e.target.tagName!=='BUTTON')return;
  filter=e.target.dataset.f;
  [...e.currentTarget.children].forEach(b=>b.classList.toggle('active',b.dataset.f===filter));
  renderTasks();
});

document.getElementById('prev-month').onclick=()=>{viewDate.setMonth(viewDate.getMonth()-1);renderCalendar();};
document.getElementById('next-month').onclick=()=>{viewDate.setMonth(viewDate.getMonth()+1);renderCalendar();};

const dow=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
document.getElementById('dow').innerHTML=dow.map(d=>`<div class="dow">${d}</div>`).join('');

function renderStats(){
  const total=tasks.length, done=tasks.filter(t=>t.done).length, pending=total-done;
  const prod=total?Math.round(done/total*100):0;
  document.getElementById('stat-total').textContent=total;
  document.getElementById('stat-done').textContent=done;
  document.getElementById('stat-pending').textContent=pending;
  document.getElementById('stat-prod').textContent=prod+'%';
  const today=tasks.filter(t=>t.date===todayIso());
  const tDone=today.filter(t=>t.done).length;
  const tProd=today.length?Math.round(tDone/today.length*100):0;
  document.getElementById('prog-bar').style.width=tProd+'%';
  document.getElementById('prog-text').textContent=tProd+'%';
}

function renderCalendar(){
  const y=viewDate.getFullYear(),m=viewDate.getMonth();
  document.getElementById('month-label').textContent=viewDate.toLocaleDateString(undefined,{month:'long',year:'numeric'});
  const first=new Date(y,m,1);
  const start=new Date(y,m,1-first.getDay());
  const cells=[];
  for(let i=0;i<42;i++){
    const d=new Date(start);d.setDate(start.getDate()+i);
    const iso=d.toISOString().slice(0,10);
    const other=d.getMonth()!==m, isToday=iso===todayIso();
    const has=tasks.some(t=>t.date===iso), sel=iso===selectedDate;
    cells.push(`<div class="day ${other?'other':''} ${isToday?'today':''} ${has?'has-tasks':''} ${sel?'selected':''}" data-iso="${iso}">${d.getDate()}</div>`);
  }
  const cal=document.getElementById('calendar');
  cal.innerHTML=cells.join('');
  cal.querySelectorAll('.day').forEach(el=>el.onclick=()=>{selectedDate=el.dataset.iso;renderCalendar();renderTasks();});
}

function renderTasks(){
  const list=document.getElementById('task-list');
  document.getElementById('task-day').textContent = selectedDate===todayIso()?'· today':'· '+new Date(selectedDate).toLocaleDateString(undefined,{month:'short',day:'numeric'});
  let arr=tasks.filter(t=>t.date===selectedDate);
  if(filter==='pending')arr=arr.filter(t=>!t.done);
  else if(filter==='done')arr=arr.filter(t=>t.done);
  else if(['High','Medium','Low'].includes(filter))arr=arr.filter(t=>t.priority===filter);
  else if(['Study','Work','Personal'].includes(filter))arr=arr.filter(t=>t.category===filter);
  arr.sort((a,b)=>(a.done-b.done)||({High:0,Medium:1,Low:2}[a.priority]-{High:0,Medium:1,Low:2}[b.priority]));
  if(!arr.length){list.innerHTML=`<div class="empty">No tasks here yet. Add one above ✨</div>`;return;}
  list.innerHTML=arr.map(t=>`
    <div class="task ${t.done?'done':''}" data-id="${t.id}">
      <button class="check" data-act="toggle">${t.done?'✓':''}</button>
      <div class="body">
        <div class="t">${escapeHtml(t.title)}</div>
        <div class="meta">
          <span class="chip ${t.priority.toLowerCase()}">${t.priority}</span>
          <span class="chip cat">${t.category}</span>
          <span class="chip">${t.date}</span>
        </div>
      </div>
      <div class="actions">
        <button class="icon-mini" data-act="edit" title="Edit">✎</button>
        <button class="icon-mini" data-act="del" title="Delete">🗑</button>
      </div>
    </div>`).join('');
  list.querySelectorAll('.task').forEach(el=>{
    const id=el.dataset.id;
    el.querySelector('[data-act="toggle"]').onclick=()=>{const t=tasks.find(x=>x.id===id);t.done=!t.done;save();};
    el.querySelector('[data-act="del"]').onclick=()=>{tasks=tasks.filter(x=>x.id!==id);save();};
    el.querySelector('[data-act="edit"]').onclick=()=>openEdit(id);
  });
}

function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function openEdit(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  editingId=id;
  document.getElementById('e-title').value=t.title;
  document.getElementById('e-date').value=t.date;
  document.getElementById('e-priority').value=t.priority;
  document.getElementById('e-category').value=t.category;
  document.getElementById('edit-dialog').classList.add('open');
}
document.getElementById('e-cancel').onclick=()=>document.getElementById('edit-dialog').classList.remove('open');
document.getElementById('e-save').onclick=()=>{
  const t=tasks.find(x=>x.id===editingId);if(!t)return;
  t.title=document.getElementById('e-title').value.trim()||t.title;
  t.date=document.getElementById('e-date').value;
  t.priority=document.getElementById('e-priority').value;
  t.category=document.getElementById('e-category').value;
  document.getElementById('edit-dialog').classList.remove('open');
  save();
};

function render(){renderStats();renderCalendar();renderTasks();}

if(!tasks.length){
  const t=todayIso();
  tasks=[
    {id:uid(),title:'Review project roadmap',date:t,priority:'High',category:'Work',done:false,createdAt:Date.now()},
    {id:uid(),title:'Read chapter 4 — Algorithms',date:t,priority:'Medium',category:'Study',done:true,createdAt:Date.now()},
    {id:uid(),title:'Evening run · 5km',date:t,priority:'Low',category:'Personal',done:false,createdAt:Date.now()},
  ];
  localStorage.setItem(STORE_KEY,JSON.stringify(tasks));
}
render();
</script>
</body>
</html>
